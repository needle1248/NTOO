<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Цифровой поводырь - Построение маршрута</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="route_builder">
  <div class="layout">
    <aside class="sidebar">
      <h1>Цифровой поводырь</h1>
      <p>Маршрутизация по графу, заданному конфигом.</p>
      <nav class="nav">
        <a href="/dashboard" data-page="dashboard">Панель</a>
        <a href="/devices" data-page="devices">Устройства</a>
        <a href="/route-builder" data-page="route_builder">Маршруты</a>
        <a href="/transport" data-page="transport">Транспорт</a>
        <a href="/mfc" data-page="mfc">МФЦ</a>
        <a href="/logs" data-page="logs">Логи</a>
      </nav>
    </aside>
    <main class="content">
      <section class="hero">
        <div>
          <h2 data-hero-title></h2>
          <p data-hero-subtitle></p>
        </div>
      </section>
      <div class="grid">
        <section class="card col-5">
          <h3>Построить маршрут</h3>
          <form data-action="build-route" id="route-builder-form">
            <label>ID пользователя<input name="user_id" value="user_demo"></label>
            <label>Стартовая точка<input name="start_node" type="number" value="1"></label>
            <label>Целевая точка<input name="goal_node" type="number" value="16"></label>
            <label>Промежуточные точки, через запятую<input name="via_nodes" value=""></label>
            <label>Сценарий
              <select name="scenario_kind">
                <option value="walk">walk — пеший</option>
                <option value="bus">bus — автобус / пересадка</option>
                <option value="indoor">indoor — внутри здания / МФЦ</option>
                <option value="mixed">mixed — смешанный</option>
              </select>
            </label>
            <div class="button-row">
              <button type="submit">Построить маршрут</button>
              <button type="button" class="secondary" id="voice-route-start">Говорить маршрут</button>
              <button type="button" class="secondary" id="voice-route-stop" disabled>Стоп</button>
            </div>
            <button type="button" id="voice-route-build" disabled>Построить голосом</button>
          </form>

          <section class="voice-panel">
            <h4>Голосовой ввод</h4>
            <div id="route-builder-status" class="status-box">Голосовой ввод не запущен.</div>
            <p id="route-builder-missing" class="meta"></p>
            <label>Распознанная речь
              <textarea id="voice-route-transcript" rows="4" placeholder="Здесь появится распознанная речь пользователя"></textarea>
            </label>
            <label>JSON от DeepSeek-R1
              <pre id="voice-route-model-json" class="compact-pre"></pre>
            </label>
          </section>
        </section>

        <section class="card col-7">
          <h3>JSON маршрута</h3>
          <pre id="route-result"></pre>
        </section>
      </div>
    </main>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
